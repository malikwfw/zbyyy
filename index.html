<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لقد وقعت في الفخ!</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #000;
            color: #ff0000;
            font-family: 'Arial', sans-serif;
            text-align: center;
            font-size: 2em;
            flex-direction: column;
        }
        h1 {
            margin: 0;
            padding: 20px;
            border: 3px solid #ff0000;
            animation: blinker 1s linear infinite;
        }
        @keyframes blinker {
            50% { opacity: 0; }
        }
    </style>
</head>
<body>
    <h1>كسمك وقعت في الفخ بياناتك كلها وصلتلي</h1>
</body>
</html>
